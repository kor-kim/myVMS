name: Build Native APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/myVMS-native-v1.0.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: myVMS-native-apk
          path: output/myVMS-native-v1.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: native-v1.0.${{ github.run_number }}
          name: "myVMS Native v1.0 (Build ${{ github.run_number }})"
          body: |
            ## myVMS Native Android App
            RTSP 실시간 스트리밍 (ExoPlayer), IP/RTSP 장치 연결, PTZ 제어
          files: output/myVMS-native-v1.0.apk
          token: ${{ secrets.GITHUB_TOKEN }}
